name: Update Profile README with Latest Blogs

on:
  push:
    branches:
      - main
    paths:
      - '**.md'
      - '!README.md'   # Don't trigger on README changes itself
  workflow_dispatch:   # Allow manual trigger

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: read   # Read this (blog) repo

    steps:
      - name: Checkout blog repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history so we can sort by commit date

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests PyGithub

      - name: Run blog list updater
        env:
          PROFILE_REPO_TOKEN: ${{ secrets.PROFILE_REPO_TOKEN }}
        run: python .github/scripts/update_blog_list.py
